services :
  redis:
    image: redis:7-alpine
    container_name: chai-aur-redis
    ports:
    - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  mongo :
    image: mongo:7
    container_name: chai-aur-mongo
    environment:
      MONGO_INITDB_DATABASE: chai_aur_redis
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
volumes:
  redis-data:
  mongo-data: